<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Widget Devis - Démo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #0f1117;
        --ink-soft: #5a5f72;
        --surface: #ffffff;
        --border: #e8eaef;
        --accent: #1a56e8;
        --accent-h: #1344c4;
        --error: #dc2626;
        --radius: 16px;
        --sab: env(safe-area-inset-bottom, 0px);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #f3f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow-x: hidden;
      }

      /* ── ÉLÉMENTS DE DÉMO (STYLE IMAGE) ──────────────── */
      .demo-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #f8faff 0%, #f3f4f8 100%);
        z-index: -1;
      }
      .demo-label {
        text-align: center;
        padding: 20px;
      }
      .demo-label span {
        display: block;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 8px;
        font-weight: 500;
      }
      .demo-label p {
        font-family: "Instrument Serif", serif;
        font-size: clamp(24px, 5vw, 32px);
        color: var(--ink);
        line-height: 1.2;
      }

      /* ── FAB ─────────────────────────────────────── */
      #fab {
        position: fixed;
        bottom: calc(24px + var(--sab));
        right: 24px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--ink);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
      }

      /* ── Panel ───────────────────────────────────── */
      #panel {
        position: fixed;
        bottom: calc(100px + var(--sab));
        right: 24px;
        width: 360px;
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.15);
        z-index: 999;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px);
        pointer-events: none;
        transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      }
      #panel.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: all;
      }

      @media (max-width: 600px) {
        #panel {
          bottom: 0;
          right: 0;
          left: 0;
          width: 100%;
          border-radius: 24px 24px 0 0;
          max-height: 92dvh;
          transform: translateY(100%);
          opacity: 1;
          transition: transform 0.3s ease;
        }
        #panel.open {
          transform: translateY(0);
        }
      }

      .panel-header {
        background: var(--ink);
        padding: 24px;
        color: #fff;
        flex-shrink: 0;
      }
      .panel-header h2 {
        font-family: "Instrument Serif", serif;
        font-size: 26px;
        line-height: 1.1;
        font-weight: 400;
      }
      .panel-header p {
        font-size: 14px;
        opacity: 0.7;
        margin-top: 4px;
      }

      .panel-scrollable {
        overflow-y: auto;
        flex: 1;
        -webkit-overflow-scrolling: touch;
      }
      .panel-body {
        padding: 24px;
      }

      .field {
        margin-bottom: 18px;
        position: relative;
      }
      .field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--ink-soft);
        margin-bottom: 6px;
      }
      .field input,
      .field select {
        width: 100%;
        height: 50px;
        padding: 0 14px;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-size: 16px;
        font-family: inherit;
        background: #fafbfc;
        outline: none;
        transition: all 0.2s;
      }
      .field input:focus,
      .field select:focus {
        border-color: var(--accent);
        background: #fff;
      }

      .error-msg {
        color: var(--error);
        font-size: 12px;
        margin-top: 5px;
        display: none;
      }
      .field.has-error input,
      .field.has-error select {
        border-color: var(--error);
        background: #fff5f5;
      }
      .field.has-error .error-msg {
        display: block;
      }

      .btn-submit {
        width: 100%;
        height: 54px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        margin-top: 10px;
      }

      .success-view {
        display: none;
        padding: 50px 24px;
        text-align: center;
      }
      .success-view.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="demo-bg"></div>
    <div class="demo-label">
      <span>DevisRapide.fr</span>
      <p>Appuyez sur le bouton pour tester la démo →</p>
    </div>

    <button id="fab">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        ></path>
      </svg>
    </button>

    <div id="panel">
      <div class="panel-header">
        <h2>Recevez un devis<br /><em>en 2 minutes</em></h2>
        <p>Gratuit &amp; sans engagement</p>
      </div>

      <div class="panel-scrollable">
        <form id="lead-form" novalidate>
          <div class="panel-body">
            <div class="field">
              <label for="f-name">Votre nom</label>
              <input id="f-name" type="text" placeholder="Jean Dupont" />
              <span class="error-msg">Veuillez entrer votre nom.</span>
            </div>

            <div class="field">
              <label for="f-phone">Téléphone</label>
              <input id="f-phone" type="tel" placeholder="06 12 34 56 78" />
              <span class="error-msg">Numéro de téléphone invalide.</span>
            </div>

            <div class="field">
              <label for="f-type">Type de travaux</label>
              <select id="f-type">
                <option value="" disabled selected>Sélectionner…</option>
                <option value="plomberie">🔧 Plomberie</option>
                <option value="chauffage">🔥 Chauffage</option>
              </select>
              <span class="error-msg"
                >Veuillez choisir un type de travaux.</span
              >
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
              Envoyer ma demande
            </button>
          </div>
        </form>

        <div class="success-view" id="success-view">
          <h3
            style="
              font-family: &quot;Instrument Serif&quot;, serif;
              font-size: 28px;
            "
          >
            Merci !
          </h3>
          <p style="margin-top: 10px; color: var(--ink-soft)">
            Un conseiller vous rappelle d'ici quelques instants.
          </p>
        </div>
      </div>
    </div>

    <script>
      const fab = document.getElementById("fab");
      const panel = document.getElementById("panel");
      const form = document.getElementById("lead-form");
      const scrollable = document.querySelector(".panel-scrollable");

      fab.addEventListener("click", () => {
        panel.classList.toggle("open");
      });

      function validate() {
        let isValid = true;
        const name = document.getElementById("f-name");
        const phone = document.getElementById("f-phone");
        const type = document.getElementById("f-type");

        document
          .querySelectorAll(".field")
          .forEach((f) => f.classList.remove("has-error"));

        if (name.value.trim().length < 2) {
          name.closest(".field").classList.add("has-error");
          isValid = false;
        }
        if (!/^\d{10,}$/.test(phone.value.replace(/[\s\-.+]/g, ""))) {
          phone.closest(".field").classList.add("has-error");
          isValid = false;
        }
        if (!type.value) {
          type.closest(".field").classList.add("has-error");
          isValid = false;
        }
        return isValid;
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", () => {
          if (window.innerWidth > 600 || !panel.classList.contains("open"))
            return;
          const vh = window.visualViewport.height;
          const isKeyboardUp = window.innerHeight - vh > 60;

          if (isKeyboardUp) {
            scrollable.style.paddingBottom = "60vh";
            setTimeout(() => {
              document.activeElement?.scrollIntoView({
                behavior: "smooth",
                block: "center",
              });
            }, 100);
          } else {
            scrollable.style.paddingBottom = "0";
          }
        });
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!validate()) return;
        document.getElementById("btn-submit").innerText = "Envoi...";
        await new Promise((r) => setTimeout(r, 1200));
        form.style.display = "none";
        document.getElementById("success-view").classList.add("visible");
      });
    </script>
  </body>
</html>
