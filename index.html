<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Widget Devis Premium Compact</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #111318;
        --ink-soft: #8e93a6;
        --surface: #ffffff;
        --border: #eef0f5;
        --accent: #1d58f2;
        --radius: 24px;
        --sab: env(safe-area-inset-bottom, 0px);
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: #f3f4f8;
        min-height: 100vh;
      }

      /* ── ARRIÈRE-PLAN DÉMO ── */
      .demo-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #f8faff 0%, #f3f4f8 100%);
        z-index: -1;
      }
      .demo-label {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        width: 100%;
      }
      .demo-label span {
        display: block;
        font-size: 11px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 8px;
      }
      .demo-label p {
        font-family: "Instrument Serif", serif;
        font-size: clamp(24px, 5vw, 32px);
        color: var(--ink);
        line-height: 1.2;
      }

      /* ── FAB ── */
      #fab {
        position: fixed;
        bottom: calc(24px + var(--sab));
        right: 24px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--ink);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      /* ── PANEL "FLOATING CARD" ── */
      #panel {
        position: fixed;
        bottom: calc(100px + var(--sab));
        right: 24px;
        width: 370px;
        max-width: calc(100vw - 40px);
        background: var(--surface);
        border-radius: var(--radius);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
        z-index: 999;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        opacity: 0;
        transform: translateY(20px) scale(0.95);
        pointer-events: none;
        transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        transform-origin: bottom right;
      }
      #panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: all;
      }

      /* Header avec les ronds et badge */
      .panel-header {
        background: var(--ink);
        padding: 32px 24px 24px;
        color: #fff;
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .panel-header::before,
      .panel-header::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        opacity: 0.12;
      }
      .panel-header::before {
        width: 120px;
        height: 120px;
        background: var(--accent);
        top: -40px;
        right: -30px;
      }
      .panel-header::after {
        width: 80px;
        height: 80px;
        background: #fff;
        bottom: -30px;
        left: 20px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.08);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 1;
      }
      .badge i {
        color: #22c55e;
        margin-right: 6px;
        font-size: 8px;
      }

      .panel-header h2 {
        font-family: "Instrument Serif", serif;
        font-size: 32px;
        line-height: 1;
        font-weight: 400;
        margin-bottom: 6px;
        position: relative;
        z-index: 1;
      }
      .panel-header p {
        font-size: 14px;
        color: var(--ink-soft);
        position: relative;
        z-index: 1;
      }

      /* Corps du formulaire */
      .panel-scrollable {
        overflow-y: auto;
        flex: 1;
        -webkit-overflow-scrolling: touch;
        max-height: 65vh;
      }
      .panel-body {
        padding: 24px;
      }

      .field {
        margin-bottom: 18px;
      }
      .field label {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: var(--ink-soft);
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }
      .field input,
      .field select {
        width: 100%;
        height: 54px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 14px;
        font-size: 16px;
        font-family: inherit;
        background: #fafbfc;
        outline: none;
        transition: 0.2s;
      }
      .field input:focus {
        border-color: var(--accent);
        background: #fff;
      }
      .field.has-error input {
        border-color: #dc2626;
        background: #fffcfc;
      }

      /* Bouton avec icône avion */
      .btn-submit {
        width: 100%;
        height: 58px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 14px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 6px 16px rgba(29, 88, 242, 0.2);
        margin-top: 8px;
      }
      .btn-submit i {
        transform: rotate(-15deg);
        font-size: 18px;
      }

      /* Footer réassurance */
      .footer-trust {
        text-align: center;
        color: var(--ink-soft);
        font-size: 12px;
        margin-top: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .success-view {
        display: none;
        padding: 50px 20px;
        text-align: center;
      }
      .success-view.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="demo-bg"></div>
    <div class="demo-label">
      <span>DevisRapide.fr</span>
      <p>Appuyez sur le bouton pour tester la démo →</p>
    </div>

    <button id="fab">
      <svg
        width="24"
        height="24"
        viewBox="0 0 24 24"
        fill="none"
        stroke="white"
        stroke-width="2.5"
      >
        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        ></path>
      </svg>
    </button>

    <div id="panel">
      <div class="panel-header">
        <div class="badge">
          <i class="fa-solid fa-circle"></i> Réponse rapide
        </div>
        <h2>Recevez un devis<br /><em>en 2 minutes</em></h2>
        <p>Gratuit & sans engagement</p>
      </div>

      <div class="panel-scrollable">
        <form id="lead-form" novalidate>
          <div class="panel-body">
            <div class="field">
              <label>VOTRE NOM</label>
              <input type="text" id="f-name" placeholder="Jean Dupont" />
            </div>

            <div class="field">
              <label>TÉLÉPHONE</label>
              <input type="tel" id="f-phone" placeholder="06 12 34 56 78" />
            </div>

            <div class="field">
              <label>TYPE DE TRAVAUX</label>
              <select id="f-type">
                <option value="" disabled selected>Sélectionner...</option>
                <option>🔧 Plomberie</option>
                <option>🔥 Chauffage</option>
              </select>
            </div>

            <button type="submit" class="btn-submit" id="btn-submit">
              <i class="fa-solid fa-paper-plane"></i> Envoyer ma demande
            </button>

            <div class="footer-trust">
              <i class="fa-solid fa-lock"></i> Données sécurisées — jamais
              revendues
            </div>
          </div>
        </form>

        <div class="success-view" id="success-view">
          <i
            class="fa-solid fa-circle-check"
            style="color: #22c55e; font-size: 40px; margin-bottom: 16px"
          ></i>
          <h3
            style="
              font-family: &quot;Instrument Serif&quot;, serif;
              font-size: 32px;
            "
          >
            Merci !
          </h3>
          <p style="margin-top: 10px; color: var(--ink-soft)">
            Un conseiller vous rappelle d'ici 2 min.
          </p>
        </div>
      </div>
    </div>

    <script>
      const panel = document.getElementById("panel");
      const form = document.getElementById("lead-form");
      const scrollable = document.querySelector(".panel-scrollable");

      document.getElementById("fab").onclick = () =>
        panel.classList.toggle("open");

      form.onsubmit = async (e) => {
        e.preventDefault();
        let isValid = true;
        form.querySelectorAll(".field").forEach((f) => {
          const input = f.querySelector("input, select");
          if (!input.value.trim()) {
            f.classList.add("has-error");
            isValid = false;
          } else {
            f.classList.remove("has-error");
          }
        });

        if (!isValid) return;

        const btn = document.getElementById("btn-submit");
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Envoi...';

        await new Promise((r) => setTimeout(r, 1200));
        form.style.display = "none";
        document.getElementById("success-view").classList.add("visible");
      };

      // Fix clavier intelligent
      if (window.visualViewport) {
        window.visualViewport.onresize = () => {
          if (!panel.classList.contains("open")) return;
          const isUp = window.innerHeight - window.visualViewport.height > 60;
          scrollable.style.paddingBottom = isUp ? "60vh" : "0";
          if (isUp)
            setTimeout(
              () =>
                document.activeElement?.scrollIntoView({
                  behavior: "smooth",
                  block: "center",
                }),
              50,
            );
        };
      }
    </script>
  </body>
</html>
